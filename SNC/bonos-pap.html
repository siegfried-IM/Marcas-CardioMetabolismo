.bonos-banner .live{display:inline-block;width:7px;height:7px;border-radius:50%;background:#16a34a;margin-right:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.bonos-banner .src{font-family:'IBM Plex Mono',monospace;color:var(--sie);font-weight:600;}
.bonos-banner .src a{color:var(--sie);text-decoration:none;}
.bonos-banner .src a:hover{text-decoration:underline;}
iframe.bonos{flex:1;width:100%;border:0;background:#fff;}
